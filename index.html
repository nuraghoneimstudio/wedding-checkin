<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f5;--card:#fff;--bdr:#e0e0e0;--bdr2:#ccc;
  --txt:#111;--muted:#888;--light:#efefef;
  --blue:#1a6ef5;--blue-bg:#e8f0fe;--blue-bdr:#93b4f7;--blue-dk:#1249c0;
  --green:#16a34a;--green-bg:#dcfce7;--green-bdr:#86efac;--green-dk:#166534;
  --amber:#c07b00;--amber-bg:#fef3c7;--amber-bdr:#fbbf24;
  --purple:#7c3aed;--purple-bg:#ede9fe;--purple-bdr:#c4b5fd;--purple-dk:#5b21b6;
  --red:#dc2626;--red-bg:#fee2e2;
  --r:10px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f0f0f;--card:#1a1a1a;--bdr:#2a2a2a;--bdr2:#444;
    --txt:#f0f0f0;--muted:#666;--light:#222;
    --blue-bg:#1a2d4a;--blue-bdr:#2563eb;--blue-dk:#93b4f7;
    --green-bg:#14401e;--green-bdr:#16a34a;--green-dk:#86efac;
    --amber-bg:#3d2700;--amber-bdr:#d97706;
    --purple-bg:#2e1a56;--purple-bdr:#7c3aed;--purple-dk:#c4b5fd;
    --red-bg:#450a0a}
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}

/* ── Header ─────────────────────────────────────────────── */
#hdr{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--bdr);z-index:50;padding:12px 14px 0}
.hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.htitle h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.htitle p{font-size:11px;color:var(--muted);margin-top:1px}
#syncBtn{border:1px solid var(--bdr2);background:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;font-family:inherit}
#syncBtn svg{width:13px;height:13px;transition:transform .4s}
#syncBtn.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#syncBtn.live{color:var(--green);border-color:var(--green-bdr)}

/* ── Stats bar ──────────────────────────────────────────── */
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.stat{background:var(--light);border-radius:8px;padding:7px 3px;text-align:center}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Tabs ────────────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--bdr);margin:0 -14px}
.tab{flex:1;padding:9px 0 10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── Search + Chips (guests tab only) ─────────────────────── */
#srchWrap{padding:10px 0 0}
input[type=search]{width:100%;padding:9px 12px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--card);color:var(--txt);font-size:14px;outline:none;margin-bottom:8px;font-family:inherit}
input[type=search]:focus{border-color:var(--blue)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr2);background:none;color:var(--muted);white-space:nowrap;font-family:inherit;transition:all .15s}
.chip.on{border-color:var(--blue-bdr);background:var(--blue-bg);color:var(--blue-dk)}

/* ── Table filter (tables tab) ──────────────────────────── */
#tblFilter{padding:10px 0 4px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
#tblFilter::-webkit-scrollbar{display:none}
.tfc{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bdr2);background:none;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.tfc.on{border-color:var(--blue-bdr);background:var(--blue-bg);color:var(--blue-dk)}

/* ── Body ────────────────────────────────────────────────── */
#body{padding:8px 12px 20px}
.sub{font-size:11px;color:var(--muted);padding:2px 2px 6px}

/* ── Guest card ─────────────────────────────────────────── */
.gc{background:var(--card);border-radius:12px;padding:11px 12px;margin-bottom:7px;border:1px solid var(--bdr);transition:border-color .15s}
.gc.A{border-left:3px solid var(--green)}
.gc.S{border-left:3px solid var(--blue);opacity:.75}
.gcrow{display:flex;gap:8px;align-items:center}
.gcinfo{flex:1;min-width:0}
.gcname{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:4px;word-break:break-word}
.gc.S .gcname{text-decoration:line-through;color:var(--muted);font-weight:400}
.gcmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.bdg{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.bdg-g{background:var(--blue-bg);color:var(--blue-dk);border:1px solid var(--blue-bdr)}
.bdg-b{background:var(--purple-bg);color:var(--purple-dk);border:1px solid var(--purple-bdr)}
.gcnt{font-size:11px;color:var(--muted)}

/* ── Action buttons ─────────────────────────────────────── */
.btns{display:flex;gap:6px;flex-shrink:0}
.abtn{width:56px;height:52px;border-radius:var(--r);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:1.5px solid var(--bdr2);background:none;font-family:inherit;transition:all .12s;-webkit-user-select:none;user-select:none}
.abtn:active{transform:scale(.93)}
.abtn.A{border-color:var(--green-bdr);background:var(--green-bg)}
.abtn.S{border-color:var(--blue-bdr);background:var(--blue-bg)}
.abtn svg{width:20px;height:20px}
.abtn span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.abtn.A span{color:var(--green-dk)}
.abtn.S span{color:var(--blue-dk)}

/* ── Table cards ─────────────────────────────────────────── */
.tc{background:var(--card);border-radius:12px;padding:13px 14px;margin-bottom:9px;border:1px solid var(--bdr)}
.tc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tc-name{font-size:14px;font-weight:700}
.tc-side{font-size:11px;color:var(--muted)}
.tc-chairs{margin-left:auto;font-size:12px;color:var(--muted);background:var(--light);padding:3px 9px;border-radius:20px}
.tc-pb{height:6px;background:var(--light);border-radius:3px;overflow:hidden;margin-bottom:10px}
.tc-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.tc-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.ts{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.ts.g{background:var(--green-bg);color:var(--green-dk)}
.ts.a{background:var(--amber-bg);color:var(--amber)}
.ts.p{background:var(--light);color:var(--muted)}
.tc-divider{border:none;border-top:1px solid var(--bdr);margin:8px 0}
.tg{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.tg:last-child{border:none;padding-bottom:0}
.tg-ic{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tg-ic.S{background:var(--green-bg)}
.tg-ic.A{background:var(--amber-bg)}
.tg-ic.P{background:var(--light)}
.tg-ic svg{width:12px;height:12px}
.tg-name{flex:1;font-size:13px;word-break:break-word;line-height:1.3}
.tg.S .tg-name{text-decoration:line-through;color:var(--muted)}
.tg-cnt{font-size:11px;color:var(--muted);flex-shrink:0}

/* ── Footer ─────────────────────────────────────────────── */
#foot{border-top:1px solid var(--bdr);background:var(--card);padding:10px 14px;text-align:center;font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>

// ─── SVG icons ───────────────────────────────────────────
const ICO_CHECK=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 8 6 12 14 4"/></svg>`;
const ICO_DOT=`<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3" fill="currentColor"/></svg>`;
const ICO_RING=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg>`;
const ICO_PERSON=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.31 2.69-6 6-6s6 2.69 6 6"/></svg>`;
const ICO_CHAIR=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="10" height="6" rx="1"/><path d="M3 9v4M13 9v4M5 13h6"/></svg>`;

// ─── State ────────────────────────────────────────────────
let status={}, curTab="guests", gFilter="all", tblFilter="all";
let statusRef=null;

// ─── Firebase ─────────────────────────────────────────────
function norm(s){
  return(s||"").replace(/[أإآٱ]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي")
    .replace(/[\u064B-\u065F]/g,"").toLowerCase().trim();
}

try{
  firebase.initializeApp(FIREBASE_CONFIG);
  statusRef=firebase.database().ref("wedding_checkin_2026");
  statusRef.on("value",snap=>{
    status=snap.val()||{};
    render();
    setSyncLive();
  });
}catch(e){
  document.getElementById("foot").innerHTML=
    `<b style="color:var(--red)">Firebase not configured — open index.html and paste your Firebase config at the top of the file.</b>`;
}

function setSyncLive(){
  const b=document.getElementById("syncBtn");
  const l=document.getElementById("syncLbl");
  if(b){b.className="live";b.classList.remove("spin");}
  if(l) l.textContent="Live";
}

function manualSync(){
  const b=document.getElementById("syncBtn");
  if(b){b.className="spin";}
  if(statusRef) statusRef.once("value",snap=>{status=snap.val()||{};render();setSyncLive();});
}

async function toggle(id,field){
  if(!statusRef) return;
  const cur=status[id]||{};
  const btn=document.getElementById("syncBtn");
  if(btn){btn.className="spin";}
  try{ await statusRef.child(id).update({[field]:!cur[field]}); }catch(e){}
}

// ─── Tab switching ────────────────────────────────────────
function setTab(t){
  curTab=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active",el.textContent.toLowerCase().includes(t==="guests"?"guest":"table")));
  const sw=document.getElementById("srchWrap");
  const tf=document.getElementById("tblFilter");
  sw.style.display=t==="guests"?"":"none";
  tf.style.display=t==="tables"?"flex":"none";
  render();
}

// ─── Render stats (always) ────────────────────────────────
function renderStats(){
  const arrived=GUESTS.filter(g=>status[g.id]?.arrived).length;
  const seated=GUESTS.filter(g=>status[g.id]?.seated).length;
  const pending=GUESTS.length-arrived;
  document.getElementById("stats").innerHTML=
    [["Total",GUESTS.length,"var(--txt)"],
     ["Arrived",arrived,"var(--green)"],
     ["Seated",seated,"var(--blue)"],
     ["Pending",pending,"var(--amber)"]].map(([l,v,c])=>
      `<div class="stat"><div class="stat-n" style="color:${c}">${v}</div><div class="stat-l">${l}</div></div>`
    ).join("");
  const totalPpl=GUESTS.reduce((s,g)=>s+g.count,0);
  const arrivedPpl=GUESTS.filter(g=>status[g.id]?.arrived).reduce((s,g)=>s+g.count,0);
  document.getElementById("foot").innerHTML=
    `${arrived} of ${GUESTS.length} families arrived &nbsp;&middot;&nbsp; ${seated} seated &nbsp;&middot;&nbsp; ${arrivedPpl} of ${totalPpl} total guests arrived`;
}

// ─── Render guest list ────────────────────────────────────
const CHIPS_DEF=[["all","All"],["pending","Not Arrived"],["middle","Arrived, Not Seated"],["seated","Seated"],["groom","Groom's Side"],["bride","Bride's Side"]];

function renderGuests(){
  document.getElementById("chips").innerHTML=CHIPS_DEF.map(([k,l])=>
    `<button class="chip${gFilter===k?" on":""}" onclick="gFilter='${k}';renderGuests()">${l}</button>`
  ).join("");

  const search=(document.getElementById("srch")||{}).value||"";
  const sq=norm(search);
  const list=GUESTS.filter(g=>{
    const st=status[g.id]||{};
    if(gFilter==="groom"&&g.side!=="groom") return false;
    if(gFilter==="bride"&&g.side!=="bride") return false;
    if(gFilter==="pending"&&st.arrived) return false;
    if(gFilter==="middle"&&(!st.arrived||st.seated)) return false;
    if(gFilter==="seated"&&!st.seated) return false;
    if(sq) return norm(g.name).includes(sq)||g.name.toLowerCase().includes(search.toLowerCase());
    return true;
  });

  document.getElementById("sub").textContent=`${list.length} result${list.length!==1?"s":""}`;
  document.getElementById("list").innerHTML=list.length===0
    ?`<div style="text-align:center;padding:40px;color:var(--muted)">No results found</div>`
    :list.map(g=>{
        const st=status[g.id]||{};
        const isA=!!st.arrived, isS=!!st.seated;
        const cls=isS?"S":isA?"A":"";
        return`<div class="gc ${cls}">
          <div class="gcrow">
            <div class="gcinfo">
              <div class="gcname">${g.name}</div>
              <div class="gcmeta">
                <span class="bdg bdg-${g.side}">${g.table} &middot; ${g.side==="groom"?"Groom":"Bride"}</span>
                <span class="gcnt">${g.count} ${g.count===1?"guest":"guests"}</span>
              </div>
            </div>
            <div class="btns">
              <button class="abtn${isA?" A":""}" onclick="toggle('${g.id}','arrived')" aria-label="Mark arrived">
                <span style="width:22px;height:22px;color:${isA?"var(--green)":"var(--muted)"}">${isA?ICO_CHECK:ICO_RING}</span>
                <span>Arrived</span>
              </button>
              <button class="abtn${isS?" S":""}" onclick="toggle('${g.id}','seated')" aria-label="Mark seated">
                <span style="width:22px;height:22px;color:${isS?"var(--blue)":"var(--muted)"}">${isS?ICO_CHECK:ICO_RING}</span>
                <span>Seated</span>
              </button>
            </div>
          </div>
        </div>`;
      }).join("");
}

// ─── Render tables tab ────────────────────────────────────
const TABLE_ORDER=["Polo Right","Table 5","Rose","Jasmine","Lily","Tulip","Orchid","Peony","Flora","Table 6","Table 7","Table 8","Table 1","Daisy","Lavender","Camellia","Gardenia","Lotus","Dahlia","Violet","Table 2","Table 3","Table 4"];

function renderTables(){
  const tfOpts=[["all","All Tables"],["groom","Groom's Side"],["bride","Bride's Side"]];
  document.getElementById("tblFilter").innerHTML=tfOpts.map(([k,l])=>
    `<button class="tfc${tblFilter===k?" on":""}" onclick="tblFilter='${k}';renderTables()">${l}</button>`
  ).join("");

  const tables=TABLE_ORDER.filter(t=>{
    const g=GUESTS.find(x=>x.table===t);
    if(!g) return false;
    if(tblFilter==="groom"&&g.side!=="groom") return false;
    if(tblFilter==="bride"&&g.side!=="bride") return false;
    return true;
  });

  document.getElementById("sub").textContent=`${tables.length} table${tables.length!==1?"s":""}`;
  document.getElementById("list").innerHTML=tables.map(tName=>{
    const tGuests=GUESTS.filter(g=>g.table===tName);
    const side=tGuests[0].side;
    const cap=TABLE_CAPS[tName]||tGuests.reduce((s,g)=>s+g.count,0);
    const assigned=tGuests.reduce((s,g)=>s+g.count,0);
    const empty=cap-assigned;

    const seated=tGuests.filter(g=>status[g.id]?.seated);
    const arrived=tGuests.filter(g=>status[g.id]?.arrived&&!status[g.id]?.seated);
    const pending=tGuests.filter(g=>!status[g.id]?.arrived);
    const seatedPpl=seated.reduce((s,g)=>s+g.count,0);
    const pct=Math.round((seatedPpl/cap)*100);

    const guestRows=tGuests.map(g=>{
      const st=status[g.id]||{};
      const isS=!!st.seated, isA=!!st.arrived;
      const cls=isS?"S":isA?"A":"P";
      const ic=isS?`<span style="color:var(--green)">${ICO_CHECK}</span>`:isA?`<span style="color:var(--amber)">${ICO_DOT}</span>`:`<span style="color:var(--muted)">${ICO_RING}</span>`;
      return`<div class="tg ${cls}">
        <span class="tg-ic ${cls}">${ic}</span>
        <span class="tg-name">${g.name}</span>
        <span class="tg-cnt">${g.count}</span>
      </div>`;
    }).join("");

    return`<div class="tc">
      <div class="tc-head">
        <span class="bdg bdg-${side} tc-name">${tName}</span>
        <span class="tc-side">${side==="groom"?"Groom's Side":"Bride's Side"}</span>
        <span class="tc-chairs">${ICO_CHAIR}&thinsp;${cap} chairs &nbsp; ${empty>0?`<b style="color:var(--amber)">${empty} empty</b>`:""}</span>
      </div>
      <div class="tc-pb"><div class="tc-fill" style="width:${pct}%"></div></div>
      <div class="tc-stats">
        ${seated.length?`<span class="ts g">${ICO_CHECK} ${seated.length} seated (${seatedPpl} ppl)</span>`:""}
        ${arrived.length?`<span class="ts a">${ICO_DOT} ${arrived.length} arrived, waiting</span>`:""}
        ${pending.length?`<span class="ts p">${ICO_RING} ${pending.length} not arrived</span>`:""}
      </div>
      <hr class="tc-divider">
      ${guestRows}
    </div>`;
  }).join("");
}

// ─── Main render ──────────────────────────────────────────
function render(){
  renderStats();
  if(curTab==="guests") renderGuests();
  else renderTables();
}

render();
</script>
